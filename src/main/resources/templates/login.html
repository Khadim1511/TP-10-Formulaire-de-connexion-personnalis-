<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Application Sécurisée</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2b5797;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2b5797;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1e3f70;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .logout {
            color: green;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2> Authentification</h2>

        <!-- Message d'erreur si identifiants incorrects -->
        <p th:if="${param.error}" class="error">
            Identifiants incorrects, veuillez réessayer.
        </p>

        <!-- Message de succès après déconnexion -->
        <p th:if="${param.logout}" class="logout">
             Vous êtes déconnecté avec succès.
        </p>

        <!--
            th:action="@{/authenticate}" : envoie le formulaire vers l'URL interceptée par Spring Security.
            method="post" est obligatoire pour le login Spring Security.
            Le token CSRF est automatiquement injecté par Thymeleaf + Spring Security.
        -->
        <form th:action="@{/authenticate}" method="post">
            <label>Nom d'utilisateur :</label>
            <input type="text"
                   name="username"
                   placeholder="Saisir le nom d'utilisateur"
                   required />

            <label>Mot de passe :</label>
            <input type="password"
                   name="password"
                   placeholder="Mot de passe"
                   required />

            <button type="submit">Se connecter</button>
        </form>
    </div>
</body>
</html>
